name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - expreszo
          - expreszo-datetime
          - expreszo-mcp-server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: https://registry.npmjs.org/
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Lint (all workspaces)
      run: yarn workspaces run lint

    - name: Build (all workspaces)
      # Must run before type-check; see comment in ci.yml.
      run: yarn workspaces run build

    - name: Type-check (all workspaces)
      run: yarn workspaces run type-check

    - name: Test (all workspaces)
      run: yarn workspaces run test

    - name: Sync canonical README into expreszo package
      # The repo-root README is the source of truth for @pro-fa/expreszo;
      # the package directory ships a stub during dev, replaced here so the
      # published npm tarball gets the full content.
      if: matrix.package == 'expreszo'
      run: cp README.md packages/expreszo/README.md

    - name: Show package identity
      working-directory: packages/${{ matrix.package }}
      run: |
        echo "Package: $(node -p "require('./package.json').name")"
        echo "Version: $(node -p "require('./package.json').version")"

    - name: Publish ${{ matrix.package }} to npm
      working-directory: packages/${{ matrix.package }}
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
