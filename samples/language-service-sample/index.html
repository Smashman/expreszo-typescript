<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>ExpresZo Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <script src="./dist/bundle.js"></script>
    <!-- Monaco loader from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-900 dark:text-[#e5e7eb]">
    <div id="app">
        <!-- Header -->
        <header class="h-14 bg-white dark:bg-[#1f2937] border-b border-gray-200 dark:border-[#374151] flex items-center justify-between px-4 shadow-sm flex-shrink-0">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-3">
                    <img src="/docs/logo.png" alt="ExpresZo" class="h-8 w-auto block dark:hidden" />
                    <img src="/docs/logo_dark.png" alt="ExpresZo" class="h-8 w-auto hidden dark:block" />
                    <h1 class="text-xl font-semibold text-[#f97316]">
                        Playground
                    </h1>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- Legacy Mode Toggle -->
                <label class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-100 dark:bg-[#374151] text-sm text-gray-700 dark:text-[#e5e7eb] cursor-pointer select-none" title="Swap in the legacy implementations of +, /, |, comparisons, indexOf, and join.">
                    <input id="legacyToggle" type="checkbox" class="accent-[#f97316]" />
                    <span>Legacy mode</span>
                </label>

                <!-- Format Button -->
                <button id="formatBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-[#374151] dark:hover:bg-[#4b5563] text-gray-700 dark:text-[#e5e7eb] font-medium text-sm transition-colors shadow-sm hover:shadow-md" title="Format expression (Shift+Alt+F)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h16" />
                    </svg>
                    Format
                </button>

                <!-- Save Button -->
                <button id="saveBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-[#f97316] hover:bg-[#ea580c] dark:bg-[#f97316] dark:hover:bg-[#ea580c] text-white font-medium text-sm transition-colors shadow-sm hover:shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V8l-4-4H8zM6 4v4h8V4M6 20v-7h12v7M10 4v4M14 16v2" />
                    </svg>
                    Save
                </button>

                <!-- GitHub Link -->
                <a href="https://github.com/Pro-Fa/expreszo-typescript" target="_blank" rel="noopener noreferrer" class="p-2 rounded-lg bg-gray-100 dark:bg-[#374151] hover:bg-gray-200 dark:hover:bg-[#4b5563] transition-colors" title="View on GitHub" aria-label="View on GitHub">
                    <svg class="w-5 h-5 text-gray-700 dark:text-[#e5e7eb]" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                    </svg>
                </a>

                <!-- Theme Toggle -->
                <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-[#374151] hover:bg-gray-200 dark:hover:bg-[#4b5563] transition-colors" title="Toggle theme">
                    <svg id="sunIcon" class="w-5 h-5 text-amber-500 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg id="moonIcon" class="w-5 h-5 text-slate-700 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="mainContent">
            <!-- Examples Sidebar -->
            <aside id="examplesSidebar" class="w-64 bg-gray-50 dark:bg-[#111827] border-r border-gray-200 dark:border-[#374151] flex-shrink-0 flex flex-col">
                <div class="h-10 bg-gray-100 dark:bg-[#1f2937] border-b border-gray-200 dark:border-[#374151] flex items-center px-4">
                    <svg class="w-4 h-4 text-[#f97316] mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span class="text-sm font-medium text-gray-700 dark:text-[#e5e7eb]">Examples</span>
                </div>
                <div id="examplesList" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <!-- Examples will be populated by JavaScript -->
                </div>
            </aside>

            <!-- Main Work Area -->
            <div id="workArea" class="flex-1 flex flex-col">
                <!-- Expression Editor -->
                <div id="expressionPane" class="pane bg-white dark:bg-[#0f172a]">
                    <div class="pane-header h-10 bg-gray-100 dark:bg-[#111827] border-b border-gray-200 dark:border-[#374151] flex items-center px-4">
                        <span class="text-sm font-medium text-gray-600 dark:text-[#e5e7eb]">Expression</span>
                        <span class="ml-2 text-xs text-gray-400 dark:text-[#9ca3af]">Enter your ExpresZo expression</span>
                    </div>
                    <div class="editor-wrapper">
                        <div id="expressionEditor"></div>
                    </div>
                </div>

                <!-- Horizontal Resizer -->
                <div id="horizontalResizer" class="bg-gray-200 dark:bg-[#374151]"></div>

                <!-- Bottom Split Area -->
                <div id="bottomArea" class="flex-1 flex">
                    <!-- Context Editor Pane -->
                    <div id="contextPane" class="pane bg-white dark:bg-[#0f172a] border-t border-gray-200 dark:border-[#374151]">
                        <div class="pane-header h-10 bg-gray-100 dark:bg-[#111827] border-b border-gray-200 dark:border-[#374151] flex items-center px-4">
                            <span class="text-sm font-medium text-gray-600 dark:text-[#e5e7eb]">Context (JSON)</span>
                            <span class="ml-2 text-xs text-gray-400 dark:text-[#9ca3af]">Variables available in expressions</span>
                        </div>
                        <div class="editor-wrapper">
                            <div id="contextEditor"></div>
                        </div>
                    </div>

                    <!-- Vertical Resizer -->
                    <div id="verticalResizer" class="bg-gray-200 dark:bg-[#374151]"></div>

                    <!-- Results Pane -->
                    <div id="resultsPane" class="pane bg-white dark:bg-[#0f172a] border-t border-gray-200 dark:border-[#374151]">
                        <div class="pane-header h-10 bg-gray-100 dark:bg-[#111827] border-b border-gray-200 dark:border-[#374151] flex items-center px-4">
                            <span class="text-sm font-medium text-gray-600 dark:text-[#e5e7eb]">Result</span>
                        </div>
                        <div id="resultContainer" class="flex-1 p-4 overflow-auto">
                            <div id="resultSuccess" class="hidden">
                                <div class="flex items-start gap-3">
                                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-green-100 dark:bg-[#2d4a3e] flex items-center justify-center">
                                        <svg class="w-5 h-5 text-green-600 dark:text-[#4ec9b0]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-sm text-gray-500 dark:text-[#9ca3af]">Evaluation Result</p>
                                        <p id="resultValue" class="text-2xl font-mono font-bold text-gray-900 dark:text-[#f3f4f6] mt-1"></p>
                                        <p id="resultType" class="text-xs text-gray-400 dark:text-[#9ca3af] mt-1"></p>
                                    </div>
                                </div>
                            </div>
                            <div id="resultError" class="hidden">
                                <div class="flex items-start gap-3">
                                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-red-100 dark:bg-[#4a2d2d] flex items-center justify-center">
                                        <svg class="w-5 h-5 text-red-600 dark:text-[#f48771]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-sm font-medium text-red-600 dark:text-[#f48771]">Error</p>
                                        <p id="errorMessage" class="text-base font-mono text-red-700 dark:text-[#f48771] mt-1 bg-red-50 dark:bg-[#3a2222] p-3 rounded-lg border border-red-200 dark:border-[#5a3c3c]"></p>
                                        <div id="errorDetails" class="mt-3 text-sm text-gray-600 dark:text-[#e5e7eb] space-y-2"></div>
                                    </div>
                                </div>
                            </div>
                            <div id="resultEmpty" class="flex items-center justify-center h-full text-gray-400 dark:text-[#9ca3af]">
                                <p>Enter an expression to see results</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Save Toast Notification -->
    <div id="saveToast" class="fixed bottom-52 right-4 bg-green-600 dark:bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Saved to localStorage</span>
    </div>

    <script src="examples.js"></script>
    <script src="app.js"></script>
</body>
</html>
